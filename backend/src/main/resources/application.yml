server:
  port: 8080

spring:
  datasource:
    driver-class-name: org.sqlite.JDBC
    # 每连接经 xerial URL 参数执行 WAL + foreign_keys(WAL 库级持久,foreign_keys 连接级)
    url: jdbc:sqlite:${DB_PATH:../db/panel.db}?journal_mode=WAL&foreign_keys=on
    hikari:
      maximum-pool-size: 5
  sql:
    init:
      mode: always
      schema-locations: file:../db/schema.sql
      # ponytail: 容忍 schema 里 PRAGMA 在事务中重设 WAL 的告警;CREATE 均 IF NOT EXISTS,幂等安全
      continue-on-error: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

# 讨论并行与预算护栏(architecture §4/§5)
panel:
  max-concurrent-discussions: 3
  max-speeches: 16

# Deepseek:key 只从环境变量读,绝不硬编码
deepseek:
  api-key: ${DEEPSEEK_API_KEY:}
  base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
  model: ${DEEPSEEK_MODEL:deepseek-chat}
